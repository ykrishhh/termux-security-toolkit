<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <rect width="400" height="200" fill="#0a0a0f" rx="12"/>
  <rect x="1" y="1" width="398" height="198" fill="none" stroke="#00d4ff" stroke-opacity="0.2" rx="11"/>
  <!-- Terminal window -->
  <rect x="130" y="30" width="140" height="90" rx="6" fill="#111118" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Terminal header -->
  <rect x="130" y="30" width="140" height="18" rx="6" fill="#00d4ff" fill-opacity="0.1"/>
  <circle cx="145" cy="39" r="3" fill="#ff5f56"/>
  <circle cx="157" cy="39" r="3" fill="#ffbd2e"/>
  <circle cx="169" cy="39" r="3" fill="#27c93f"/>
  <!-- Terminal text -->
  <text x="145" y="65" font-family="'Courier New', monospace" font-size="10" fill="#00d4ff">$ termux-security</text>
  <text x="145" y="80" font-family="'Courier New', monospace" font-size="10" fill="#00d4ff" fill-opacity="0.7">[OK] 12 tools loaded</text>
  <text x="145" y="95" font-family="'Courier New', monospace" font-size="10" fill="#00d4ff" fill-opacity="0.5">Ready to scan...</text>
  <!-- Cursor blink -->
  <rect x="145" y="100" width="6" height="12" fill="#00d4ff" fill-opacity="0.8"/>
  <!-- Text -->
  <text x="200" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" font-weight="bold" letter-spacing="2">TERMUX SECURITY</text>
  <text x="200" y="165" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#00d4ff" fill-opacity="0.5">Android Security Toolkit</text>
</svg>
